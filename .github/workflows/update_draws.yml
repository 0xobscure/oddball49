name: Update TOTO Draws

on:
  schedule:
    # Mon and Thu at 14:30 UTC = 10:30 PM SGT (draws at ~9:30 PM SGT)
    - cron: '30 14 * * 1,4'
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch latest draw
        id: fetch
        run: |
          python scripts/fetch_latest.py
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Commit and push if new draw found
        if: steps.fetch.outputs.exit_code == '2'
        run: |
          git config user.name "oddball49-bot"
          git config user.email "bot@oddball49"
          git add data/draws.csv src/draws.json
          git commit -m "data: add latest TOTO draw $(date +'%Y-%m-%d')"
          git push
